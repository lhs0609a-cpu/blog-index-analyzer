# fly.toml app configuration file generated for naverpay-delivery-tracker on 2024-01-01T00:00:00+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "naverpay-delivery-tracker"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[mounts]]
  source = "blog_data"
  destination = "/app/data"

[env]
  PORT = "8001"
  APP_ENV = "production"
  DEBUG = "false"
  HOST = "0.0.0.0"
  API_VERSION = "v1"
  CORS_ORIGINS = "*"
